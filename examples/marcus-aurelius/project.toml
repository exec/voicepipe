# Marcus Aurelius — voicepipe project
#
# This file is the whole configuration. Scalars and short lists live inline here; long prose
# blocks (the synthesis preamble, the per-mode instructions, the triage rubric, the deploy
# system prompt) live as files under prompts/ and are referenced by filename below.
#
# To run the pipeline:
#   voicepipe synthesize --project .   # generate a dataset in the target voice
#   voicepipe dedup      --project .
#   voicepipe triage     --project .
#   voicepipe assemble   --project .
#   voicepipe train      --project .   # QLoRA fine-tune (needs a CUDA box + the [train] extra)
#   voicepipe deploy     --project . --adapter dataset/adapter/final --llama-cpp-dir <path> [--push]
# Or open the GUI: `voicepipe serve` and visit http://127.0.0.1:8765
#
# Everything not set here falls back to a sensible default (see pipeline/project.py).

name = "Marcus Aurelius"
description = "Roman emperor and Stoic philosopher (121-180 CE). Aphoristic self-address; equanimity, mortality, cosmic perspective; second-person directives to himself."

corpus_dir = "corpus"
seeds_file = "seeds/seed_pairs.jsonl"
# glossary_file = "corpus/00_glossary.md"   # optional: a list of recurring phrases/constructions

synth_preamble = "prompts/synth_preamble.md"
variety_menus  = "prompts/variety_menus.md"
content_rules  = "prompts/content_rules.md"

# --- prompt-category mix (what kinds of user message to synthesize) -------------------------
categories = [
  { name = "stoic_advice_request", description = "a direct request for guidance on how to handle a personal struggle or moral dilemma in the Stoic tradition", weight = 0.25 },
  { name = "cosmic_perspective_question", description = "a question about the nature of the universe, mortality, or humanity's place in the cosmos", weight = 0.2 },
  { name = "self_examination_prompt", description = "a challenge to reflect on one's own actions, motives, or character flaws, framed as a second-person directive", weight = 0.18 },
  { name = "duty_and_action_query", description = "a question about how to fulfill one's role, duty, or purpose with virtue and discipline", weight = 0.15 },
  { name = "reaction_to_adversity", description = "an expression of frustration, fear, or despair about external events, inviting a Stoic corrective", weight = 0.12 },
  { name = "philosophical_debate_challenge", description = "a provocative statement or question challenging Stoic principles or comparing them to other schools of thought", weight = 0.1 },
  { name = "personal_question", description = "a question about Marcus Aurelius' own experiences, thoughts, or struggles as emperor or philosopher", weight = 0.08 },
  { name = "small_talk_observation", description = "a mundane observation or comment about daily life, inviting a philosophical reframing", weight = 0.07 },
  { name = "request_for_clarification", description = "a request to explain or expand on a Stoic concept, aphorism, or passage from the Meditations", weight = 0.05 },
  { name = "existential_crisis", description = "a raw expression of doubt, meaninglessness, or despair, seeking reassurance or perspective", weight = 0.05 },
]
# --- response-length mix -------------------------------------------------------------------
length_profiles = [
  { name = "short",  description = "50-100 words per response",  weight = 0.35 },
  { name = "medium", description = "100-250 words per response", weight = 0.55 },
  { name = "long",   description = "250-400 words per response", weight = 0.10 },
]

# --- modes (registers the responses can be in; each batch is anchored to one) --------------
# Three registers, each anchored to a corpus file. They share one instruction block
# (modes/voice.md); the anchor file is what differentiates them.
[[modes]]
name = "MEDITATION"    # the aphoristic register — brief self-addressed observation + corrective return
description = "prompts/modes/voice.md"
weight = 2.0
corpus_anchor = "01_meditations.txt"
styles = []

[[modes]]
name = "DISCIPLINE"    # stern morning-self directive: duty-as-nature, lash against pleasure and slackness
description = "prompts/modes/voice.md"
weight = 1.0
corpus_anchor = "02_discipline.txt"
styles = []

[[modes]]
name = "COSMIC"        # the cosmic-perspective register: smallness of fame, world-as-change, death as nature's secret
description = "prompts/modes/voice.md"
weight = 1.0
corpus_anchor = "03_cosmic_perspective.txt"
styles = []

# --- synthesis -----------------------------------------------------------------------------
[synthesis]
model = "mistral-large-3:675b-cloud"   # the generator
# alt_model = "kimi-k2.6"
# Which LLM backend `model` refers to. Omitted = Ollama Cloud (needs OLLAMA_API_KEY — set it in
# the GUI's Settings, or `export OLLAMA_API_KEY=...`). For any OpenAI-compatible endpoint instead:
#   [synthesis.provider]
#   kind = "openai_compat"
#   base_url = "http://localhost:11434/v1"   # a local Ollama; or an OpenAI / vLLM / LM-Studio URL
#   # api_key_env = "OPENAI_API_KEY"          # the env var holding the key, if the endpoint needs one
# (`[triage]` takes the same optional `[triage.provider]` table.)
temperature = 0.9
top_p = 0.95
pairs_per_batch = 12
concurrency = 3
think = false                          # disable thinking-token generation (needed for reasoning models)
target = 2000                           # target total pairs (re-runnable; counts what's on disk)
balance_modes = true

# --- dedup ---------------------------------------------------------------------------------
[dedup]
cosine_threshold = 0.85
embed_model = "nomic-embed-text"        # run this one locally: `ollama pull nomic-embed-text`
embed_base_url = "http://localhost:11434"
skip_embed = false                      # set true for hash-only dedup if you have no local Ollama
closer_patterns = [
  # Phrases the generator tends to over-produce. After a synthesis run, look at
  # dataset/raw/ and add the worst offenders here so no single phrase dominates.
  # { name = "STOCK_SIGNOFF", regex = 'remember,? you can always', cap = 0.05 },
]

# --- triage (an LLM judge scores each pair 1-5 and flags policy violations) -----------------
[triage]
model = "deepseek-v4-pro"
batch_size = 30
min_keep = 4                            # keep pairs scored >= this
concurrency = 3
rubric = "prompts/triage_rubric.md"
critical_flags = ["slur", "out_of_character", "post_cutoff_reference"]
critical_flag_substrings = ["slur", "hate"]

# --- assemble ------------------------------------------------------------------------------
[assemble]
val_fraction = 0.05
salvage_paths = []                      # extra already-curated jsonl files to mix in

# --- train (QLoRA) -------------------------------------------------------------------------
[train]
base_model = "unsloth/Mistral-Nemo-Instruct-2407-bnb-4bit"   # text-only, Apache 2.0, ~8GB GGUF after merge
lora_r = 64
lora_alpha = 128
lora_dropout = 0.05
max_seq_len = 2048
batch_size = 4                          # per-device; raise on a bigger GPU
grad_accum = 4
epochs = 3.0
lr = 2e-4
optim = "paged_adamw_8bit"

# --- deploy (LoRA -> GGUF -> Ollama model) -------------------------------------------------
[deploy]
ollama_from = "mistral-nemo:12b"        # the base layer in the generated Modelfile
ollama_tag = ""                          # e.g. "you/Marcus Aurelius:v1" — where `ollama create` writes
system_message = "prompts/deploy_system.md"
gguf_outtype = "f16"
base_model_id_override = "mistralai/Mistral-Nemo-Instruct-2407"   # non-quantized HF mirror for the GGUF converter
stop = ["</s>"]

[deploy.parameters]
temperature = 0.85
top_p = 0.9
repeat_penalty = 1.08
num_predict = 400
